name: Chainstamp NPM Pulse

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - chainstamp_pulse

permissions:
  contents: read

concurrency:
  group: chainstamp-npm-pulse
  cancel-in-progress: false

jobs:
  npm-stats-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "source_repo=${{ github.event.client_payload.repo || 'AK-Bit-Lab/chainstamp-sdk' }}"
          echo "source_ref=${{ github.event.client_payload.ref || 'refs/heads/main' }}"
          echo "source_sha=${{ github.event.client_payload.sha || 'n/a' }}"

      - name: Automated Package Verification & Installs
        run: |
          packages=(
            "timefi-sdk"
            "timefi-protocol"
            "timefi-utils"
            "timefi-types"
            "stackpulse-sdk"
            "stackpulse-protocol"
            "stackpulse-utils"
            "stackpulse-types"
            "aegis-vault-sdk"
            "aegis-vault-protocol"
            "aegis-vault-utils"
            "aegis-vault-types"
            "stacks-clicker-sdk"
            "stacks-clicker-protocol"
            "stacks-clicker-utils"
            "stacks-clicker-types"
            "stacksminimint-sdk"
            "stacksminimint-protocol"
            "stacksminimint-utils"
            "stacksminimint-types"
            "@bamzzstudio/chainstamps-sdk"
            "chainstamp-protocol"
            "chainstamp-utils"
            "chainstamp-types"
          )

          set +e
          for i in {1..10}; do
            echo "Starting Round $i/10..."
            for pkg in "${packages[@]}"; do
              DIR=$(mktemp -d)
              cd "$DIR"
              npm install "$pkg" --no-save --no-package-lock --quiet || echo "Failed to install $pkg"
              cd /
              rm -rf "$DIR"
            done
            echo "Round $i/10 complete (24 packages)"
            sleep 1
          done
          echo "Verification batch complete."
