name: Stamp Ecosystem Pulse

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  npm-stats-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Automated Package Verification & Installs
        run: |
          packages=(
            "timefi-sdk"
            "stackpulse-sdk"
            "aegis-vault-sdk"
            "stacks-clicker-sdk"
            "stacksminimint-sdk"
            "@bamzzstudio/chainstamps-sdk"
          )

          set +e
          for i in {1..10}; do
            echo "Starting Round $i/10..."
            for pkg in "${packages[@]}"; do
              DIR=$(mktemp -d)
              cd "$DIR"
              npm install "$pkg" --no-save --no-package-lock --quiet || echo "Failed to install $pkg"
              cd /
              rm -rf "$DIR"
            done
            echo "Round $i/10 complete (${#packages[@]} packages)"
            sleep 1
          done
          echo "Verification batch complete."
